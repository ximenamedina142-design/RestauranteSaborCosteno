<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro - Restaurante Sabor Costeño</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">
        🍽 Restaurante Sabor Costeño
    </div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="menu.html">Menú</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
        <a href="registro.html">Registro</a>
    </nav>

</header>

<div class="formulario">

    <h1>Registro de Usuarios</h1>

    <p style="text-align:center; margin-bottom:25px; color:#555;">
        Completa tus datos para registrarte y conocer nuestras promociones.
    </p>

    <form action="#">

        <input
            type="text"
            name="nombre"
            placeholder="Nombre completo"
            required>

        <input
            type="email"
            name="correo"
            placeholder="Correo electrónico"
            required>

        <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required>

        <button type="submit">
            Registrarse
        </button>

    </form>

    <p style="margin-top:20px;text-align:center;color:#777;">
        *Esta versión del sitio es una demostración visual publicada en Netlify.
    </p>

</div>

<footer>

    <p>© 2026 Restaurante Sabor Costeño</p>
    <p>Guayaquil - Ecuador</p>

</footer>

</body>

</html>
